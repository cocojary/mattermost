name: Build & Deploy to VPS

on:
  push:
    branches:
      - master   # Trigger khi merge develop → master
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # ghcr.io/cocojary/mattermost
  DEPLOY_PATH: /opt/mattermost
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Cho phép push lên GHCR

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login vào GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tạo image metadata (tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Setup Docker Buildx (multi-platform + cache)
        uses: docker/setup-buildx-action@v3

      - name: Build và Push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha        # Cache GitHub Actions
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://103.146.23.11:8065

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS_SSH_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy files lên VPS
        run: |
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            docker-compose.prod.yml \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/
          scp -i ~/.ssh/deploy_key \
            -P ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            scripts/deploy.sh scripts/rollback.sh \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/scripts/

      - name: Deploy lên VPS
        run: |
          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "export DEPLOY_PATH='${{ env.DEPLOY_PATH }}' && \
             export COMPOSE_FILE='${{ env.COMPOSE_FILE }}' && \
             export MM_IMAGE='${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest' && \
             bash ${{ env.DEPLOY_PATH }}/scripts/deploy.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Notify Mattermost
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            ICON=":rocket:"; MSG="✅ Deploy thành công từ source"
          else
            ICON=":red_circle:"; MSG="❌ Deploy thất bại"
          fi
          curl -s -X POST "${{ secrets.MM_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"GitHub Actions\",\"icon_emoji\":\"$ICON\",\"text\":\"$MSG | Branch: \`${{ github.ref_name }}\` | Commit: \`$(echo ${{ github.sha }} | cut -c1-7)\` | By: @${{ github.actor }}\"}"
